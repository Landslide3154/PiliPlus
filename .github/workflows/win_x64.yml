name: Build for Windows x64

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:

jobs:
  build-windows-app:
    name: Release Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 windows
        continue-on-error: true

      - name: Add fastforge and Inno Setup
        run: |
          dart pub global activate fastforge
          choco install innosetup

      - name: Add Chinese language file for Inno Setup
        run: |
          Copy-Item "windows/packaging/exe/ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
        shell: pwsh

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1

      - name: Check pili_release.json
        shell: pwsh
        run: |
          if (Test-Path "pili_release.json") {
            Write-Host "pili_release.json exists:"
            Get-Content "pili_release.json"
          } else {
            Write-Host "pili_release.json NOT FOUND!"
            exit 1
          }

      - name: Flutter Build Windows (verbose)
        run: flutter build windows --release -v --pub --dart-define-from-file=pili_release.json

      - name: Prepare Upload
        shell: pwsh
        run: |
          Write-Host "=== Checking build output ==="
          if (Test-Path "build/windows/x64/runner/Release") {
            Get-ChildItem "build/windows/x64/runner/Release"
            New-Item -ItemType Directory -Force -Path Release/PiliPlus-Win | Out-Null
            Get-ChildItem "build/windows/x64/runner/Release/*" | Move-Item -Destination "Release/PiliPlus-Win/"
            Write-Host "=== Build output prepared ==="
          } else {
            Write-Host "build/windows/x64/runner/Release NOT FOUND"
            Write-Host "=== Listing build/ contents ==="
            if (Test-Path "build") { Get-ChildItem -Recurse build | Select-Object -First 50 }
            exit 1
          }

      - name: Package setup (fastforge, skip if fails)
        continue-on-error: true
        shell: pwsh
        run: |
          fastforge package --platform windows --targets exe --skip-build --flutter-build-args="dart-define-from-file=pili_release.json"
          New-Item -ItemType Directory -Force -Path PiliPlus-Win-Setup | Out-Null
          if (Test-Path "dist") {
            Get-ChildItem -Recurse dist/*.exe | ForEach-Object {
              Copy-Item $_ "PiliPlus-Win-Setup/PiliPlus_windows_${{env.version}}_x64_setup.exe"
            }
          }

      - name: Compress
        run: |
          Compress-Archive -Path "Release/PiliPlus-Win" -DestinationPath "PiliPlus_windows_${{env.version}}_x64_portable.zip"
        shell: pwsh

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            PiliPlus_windows_*.zip
            PiliPlus-Win-Setup/PiliPlus_windows_*.exe

      - name: Upload windows file release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-file-x64-release
          path: PiliPlus_windows_*.zip

      - name: Upload windows setup release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-setup-x64-release
          path: PiliPlus-Win-Setup/PiliPlus_windows_*.exe
